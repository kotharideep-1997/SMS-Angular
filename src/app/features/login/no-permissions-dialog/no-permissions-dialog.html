<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p class="dialog-message">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" type="button" mat-dialog-close>
    {{ data.okLabel }}
  </button>
</mat-dialog-actions>
